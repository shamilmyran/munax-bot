<section id="batchTransSec" class="skiptranslate">
  
</section>
<script type="text/javascript" charset="utf-8">
  let removable_btn=false
  async function start_tr_process(id){
    if(!removable_btn)on_removable_btn()
    if(REQ_LIM.reqs>8){
      await sleep(REQ_LIM.wait())
      start_tr_process(id)
      return
    }
    REQ_LIM.addOne()
    $.ajax({
      url:"batch/download",
      type:"get",
      dataType:"json",
      data:{id,user:USER.id},
      xhr:()=>{
        let xhr=new window.XMLHttpRequest()
        
        xhr.addEventListener("progress",(evt)=>{
          if(!evt.lengthComputable)return
          
          let perc=Math.round(evt.loaded/evt.total*100)
          let mPerce=perc/100*25
          let stroke=126-(mPerce*126/100),
          oldPerce=Number($(`div[fileid=${id}] .tr_prog_text`).text().replace("%","")),
          perceDiff=perc - oldPerce
          
          $(`div[fileid=${id}] .tr_prog_text`).text(perc+"%")
          $(`div[fileid=${id}] .tr_prog`).animate({"width":perc+"%"},200)
          $(`div[fileid=${id}] circle`).animate({"stroke-dashoffset":stroke},200)
          
        },false)
        
        return xhr
      },
      success:(res)=>{
        if(!res.sts)return tg_alert("Something went wrong")
        
        $(`div[fileid=${id}]`).attr("order",res.id)
        $(`div[fileid=${id}]`).attr("qlty",res.qlty)
        $(`div[fileid=${id}] .tr_prog_text`).text("100%")
        $(`div[fileid=${id}] .tr_prog`).animate({width:"100%"},200,"linear")
        $(`div[fileid=${id}] circle`).animate({"stroke-dashoffset":126-31.5},200,"linear")
        
       res.id=id
       
       TRANSED_TEXT[id]={}
       TRANS_TEXT.push(res)
        
        if(!TR_STS)return START_TRANS_LOOP()
        
        /*let html=data.reduce((t,c,i)=>{
          return t+`<div class="translate" ind="${i}">${c}</div>`
        },'')
        $("#transElmSec").append(`<div fileid="${id}" inds="${dtArrLen}">${html}</div>`)
        
        START_TRANS(id)
        return*/
      }
    })
  }
  
  function on_removable_btn(){
    removable_btn=true
    $("#batchTransSec i.fa-xmark").on("click",async(e)=>{
      if(!await tg_prompt("Are you really want to remove this translation request<br><b>You can't restore this file once you choose yes</b>"))return
      e=$(e.currentTarget).parent().parent().parent()
      let fileid=e.attr("fileid"),
      cur=e.attr("translate")
      $(`div[fileid=${fileid}]`).map((i,e)=>{
        TRANS_TEXT=TRANS_TEXT.filter(x=>x.id!=fileid)
        delete TRANSED_TEXT[fileid]
        SUB_SUCCESS(fileid)
        $(e).animate({width:"0px", opacity:0},300,"linear",()=>$(e).remove())
        if(cur)START_TRANS_LOOP()
      })
    })
  }
</script>
