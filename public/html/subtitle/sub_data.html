<div id="subDataSecMain">

    <div>
      <span style="font-size:18px">{{title}}</span>
      <span>RELEASE : {{release}}</span>
      <div>
        <span>{{type}}</span>
        <span>{{lang}}</span>
      </div>
      <span>{{genre}}</span>
      <div style="display:flex">
        <span style="display:flex;align-items:center;width:30px;justify-content: center"><i class="fa-solid fa-heart" style="font-size:20px;color:#eb2c35"></i></span>
        <span style="margin-left:5px">&nbsp;&nbsp;{{rating}}%</span>
